version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: intellmeet_mongo_dev
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: devpassword
      MONGO_INITDB_DATABASE: intellmeetv1
    volumes:
      - mongo_dev_data:/data/db

volumes:
  mongo_dev_data:
